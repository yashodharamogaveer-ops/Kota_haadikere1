      <!-- Block 1 -->
      <div class="about-block">
        <div class="about-text">
          <h2 data-en="Shantamoorthy Shri Shaneshwara Devasthana" data-kn="ಶಾಂತಮೂರ್ತಿ ಶ್ರೀ ಶನೀಶ್ವರ ದೇವಸ್ದಾನ"></h2>
          <p data-en="Shri Kshetra Haadikere Bettu, Kota – Brahmavara Taluk, Udupi District"
             data-kn="ಶ್ರೀ ಕ್ಷೇತ್ರ ಹಾಡಿಕೆರೆ ಬೆಟ್ಟು, ಕೋಟ – ಬ್ರಹ್ಮಾವರ ತಾಲ್ಲೂಕು, ಉಡುಪಿ ಜಿಲ್ಲೆ"></p>
          <p data-en="Shantamoorthy Shri Shaneshwara Swamy, worshipped along with Shri Kannika Parameshwari, is a compassionate deity who fulfills the sincere wishes of devotees."
             data-kn="ಭಕ್ತೋದ್ಧಾರಕ ಶಾಂತಮೂರ್ತಿ ಶ್ರೀ ಶನೇಶ್ವರ ಸ್ವಾಮಿ ಹಾಗೂ ಮಂಗಳಪ್ರದಾಯಿನಿ ಶ್ರೀ ಕನ್ನಿಕಾ ಪರಮೇಶ್ವರಿ ದೇವರ ಆಶೀರ್ವಾದವನ್ನು ನಂಬಿ ಬರುವ ಭಕ್ತರ ಮನೋ-ಅಭಿಷ್ಟಗಳನ್ನು ಈಡೇರಿಸುತ್ತಾ ಬಂದಿರುತ್ತಾರೆ."></p>
          <p data-en="Nearly 30 years ago, Late Sri K. Rama Swamy was working in Bengaluru and regularly served at the temple."
             data-kn="ಸುಮಾರು 30 ವರ್ಷಗಳ ಹಿಂದೆ ದಿ.ಕೆ. ರಾಮಸ್ವಾಮಿ ಅವರು ಬೆಂಗಳೂರಿನಲ್ಲಿ ಹೊಟೇಲಿನಲ್ಲಿ ಉದ್ಯೋಗ ಮಾಡುತ್ತಿದ್ದರು. ತಮ್ಮ ಬಿಡುವಿನ ಸಮಯದಲ್ಲಿ ಮತ್ತಿಕೇರೆ ಶಾಂತಮೂರ್ತಿ ಶ್ರೀ ಶನೇಶ್ವರ ಸ್ವಾಮಿ ದೇವಾಲಯದಲ್ಲಿ ಸೇವೆ ಮಾಡುತ್ತಿದ್ದರು."></p>
          <p data-en="One night, Shri Shaneshwara Swamy appeared in his dream and instructed him to establish Him at Haadikere Bettu."
             data-kn="ಒಂದು ದಿನ ರಾತ್ರಿ ನಿದ್ರಿಸುತ್ತಿದ್ದಾಗ ಶ್ರೀ ಶನೇಶ್ವರ ಸ್ವಾಮಿ ಅವರು ಕನಸಿನಲ್ಲಿ ಪ್ರತ್ಯಕ್ಷವಾಗಿ ಕೋಟದ ಹಾಡಿಕೆರೆಯಲ್ಲಿರುವ ಎಕ್ಕೆ ಗಿಡದ ಸ್ಥಳದಲ್ಲಿ ನನ್ನನ್ನು ಪ್ರತಿಷ್ಠಾಪಿಸಿ ಆರಾಧಿಸು ಎಂದು ಆದೇಶಿಸಿದರು."></p>
        </div>
        <div class="about-image">
          <img src="images/k.ramaswamy.jpg" alt="Founder Sri K. Rama Swamy">

      <!-- Block 2 -->
      <div class="about-block reverse">
        <div class="about-image">
          <img src="images/temple.jpg" alt="Shri Shaneshwara Temple">
        </div>
        <div class="about-text">
          <p data-en="With the help of devotees, a small shrine was established in 1995 and worship began."
             data-kn="ಹಣವಿಲ್ಲದೆ ಭಕ್ತರ ಸಹಾಯದಿಂದ 1995ರಲ್ಲಿ ಶ್ರೀ ಶನೇಶ್ವರನ ಸಣ್ಣದಾದ ಗುಡಿಯನ್ನು ಪ್ರತಿಷ್ಠಾಪಿಸಿ ಪೂಜಿಸುತ್ತಾ ಬಂದರು."></p>
          <p data-en="Over time, many devotees experienced relief from difficulties and found peace and happiness through the grace of Shri Shaneshwara Swamy."
             data-kn="ಕಾಲಕ್ರಮೇಣ ಶನೇಶ್ವರ ಸ್ವಾಮಿಯ ಪವಾಡಗಳಿಂದ ಅನೇಕ ಭಕ್ತರ ದುಃಖ-ದುಗುಡಗಳು ಪರಿಹಾರವಾಗಿ ಜೀವನದಲ್ಲಿ ಸುಖ-ಶಾಂತಿ-ನೆಮ್ಮದಿ ದೊರೆಯಿತು."></p>
          <p data-en="Annadana Seva, which began for five people on Mondays and Saturdays, now feeds thousands."
             data-kn="ವಾರದಲ್ಲಿ ಎರಡು ದಿನ ಐದು ಜನರಿಂದ ಪ್ರಾರಂಭವಾದ ಅನ್ನದಾನ ಇಂದು ಸಾವಿರಾರು ಭಕ್ತರಿಗೆ ಅನ್ನಪ್ರಸಾದ ನೀಡುವ ಸೇವೆಯಾಗಿದೆ."></p>
          <p data-en="Late Sri K. Rama Swamy attained divine abode in 2021. Worship continues under Sri K. Bhaskara Swamy."
             data-kn="ದಿ. ಕೆ. ರಾಮಸ್ವಾಮಿ ಅವರು 2021ರಲ್ಲಿ ದೈವಾಧೀನರಾದರು. ಅವರ ಮಾರ್ಗದರ್ಶನದಲ್ಲಿ ಕೆ. ಭಾಸ್ಕರ ಸ್ವಾಮಿ ಅವರ ಮುಂದಾಳತ್ವದಲ್ಲಿ ಪೂಜಾ ಕಾರ್ಯಗಳು ನಡೆಯುತ್ತಿವೆ."></p>
          <p data-en="The kshetra blesses devotees seeking childbirth, employment, family peace, and solutions to long-standing problems."
             data-kn="ಈ ಕ್ಷೇತ್ರವು ಸಂತಾನ ಭಾಗ್ಯ, ಉದ್ಯೋಗ, ಗೃಹ ಶಾಂತಿ ಹಾಗೂ ದೀರ್ಘಕಾಲದ ಸಮಸ್ಯೆಗಳಿಗೆ ಪರಿಹಾರ ನೀಡುವ ಕ್ಷೇತ್ರವಾಗಿದೆ."></p>
          <p data-en="Devotees can offer oil and food (anna abhisheka) to Shri Shaneshwara Swamy, and collective Shani Shanti is performed three times a year – February, August, November."
             data-kn="ಶ್ರೀ ಕ್ಷೇತ್ರಕ್ಕೆ ಬರುವ ಭಕ್ತಾದಿಗಳಿಗೆ ನೆರವಾಗಿ ಶ್ರೀ ಶನೇಶ್ವರ ದೇವರಿಗೆ ಎಣ್ಣೆ ಅನ್ನ ಅಭಿಷೇಕ ಮಾಡುವ ವ್ಯವಸ್ಥೆ ಇಲ್ಲಿ ಇದೆ. ಶ್ರೀ ಕ್ಷೇತ್ರದಲ್ಲಿ ವರ್ಷಕ್ಕೆ ಮೂರು (ಫೆಬ್ರವರಿ, ನವೆಂಬರ್, ಆಗಸ್ಟ್) ಬಾರಿ ಸಾಮೂಹಿಕ ಶನಿ ಶಾಂತಿ ಮಾಡಲಾಗುತ್ತದೆ."></p>
        </div>
      </div>
