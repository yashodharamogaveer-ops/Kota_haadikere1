<section class="about-section" id="about">

  <!-- OM SYMBOL -->

  <div class="about-wrapper">

    <!-- TEXT CONTENT -->
    <div class="about-text">

      <h2
        data-en="Shantamoorthy Shri Shaneshwara Temple"
        data-kn="ಶಾಂತಮೂರ್ತಿ ಶ್ರೀ ಶನೀಶ್ವರ ದೇವಾಲಯ">
      </h2>

      <p
        data-en="Located in the sacred land of Haadikere, this divine kshetra is a compassionate abode where devotees find relief from sorrow and blessings of peace, stability, and harmony."
        data-kn="ಉಡುಪಿ ಜಿಲ್ಲೆಯ ಬ್ರಹ್ಮಾವರ ತಾಲ್ಲೂಕಿನ ಕೋಟ ಹಾಡಿಕೆರೆಯ ಪವಿತ್ರ ಭೂಮಿಯಲ್ಲಿ ನೆಲೆಸಿರುವ ಭಕ್ತೋದ್ಧಾರಕ ಶಾಂತಮೂರ್ತಿ ಶ್ರೀ ಶನೇಶ್ವರ ಹಾಗೂ ಮಂಗಳಪ್ರದಾಯಿನಿ ಶ್ರೀ ಕನ್ನಿಕಾ ಪರಮೇಶ್ವರಿ ದೇವರ ಸನ್ನಿಧಾನವು ನಂಬಿ ಬರುವ ಭಕ್ತರ ಮನೋಭಿಲಾಷೆಗಳನ್ನು ಈಡೇರಿಸುತ್ತಾ ಬಂದಿದೆ.">
      </p>

      <p
        data-en="In 1995, guided by divine vision, this temple was established through devotion and faith. Today, thousands of devotees seek refuge here for relief from Shani dosha, life challenges, and spiritual obstacles."
        data-kn="1995ರಲ್ಲಿ ದಿವ್ಯ ಸೂಚನೆಯಂತೆ ದಿ. ಕೆ. ರಾಮಸ್ವಾಮಿ ಅವರಿಂದ ಭಕ್ತರ ಸಹಕಾರದೊಂದಿಗೆ ಶ್ರೀ ಶನೇಶ್ವರನ ಸಣ್ಣ ಗುಡಿ ಪ್ರತಿಷ್ಠಾಪಿಸಲಾಯಿತು. ಶನಿ ದೋಷ, ಉದ್ಯೋಗ ಸಮಸ್ಯೆ, ಕುಟುಂಬದ ಅಶಾಂತಿ ಹಾಗೂ ಜೀವನದ ಸಂಕಷ್ಟಗಳಿಂದ ಮುಕ್ತಿ ಪಡೆಯಲು ಇಂದು ಸಾವಿರಾರು ಭಕ್ತರು ಈ ಕ್ಷೇತ್ರಕ್ಕೆ ಆಗಮಿಸುತ್ತಿದ್ದಾರೆ.">
      </p>

      <p
        data-en="Weekly annadana on Mondays and Saturdays and annual Shani Shanti poojas reflect the living tradition of service and devotion."
        data-kn="ಸೋಮವಾರ ಮತ್ತು ಶನಿವಾರ ನಡೆಯುವ ಅನ್ನದಾನ ಸೇವೆ ಹಾಗೂ ವರ್ಷಕ್ಕೆ ಮೂರು ಬಾರಿ ನಡೆಯುವ ಸಾಮೂಹಿಕ ಶನಿ ಶಾಂತಿ ಪೂಜೆಗಳು ಈ ಕ್ಷೇತ್ರದ ಸೇವಾ ಪರಂಪರೆಯನ್ನು ಪ್ರತಿಬಿಂಬಿಸುತ್ತವೆ.">
      </p>
